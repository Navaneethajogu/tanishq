<!DOCTYPE html>
<html>
<head>
  <title>{{ category.name }} - Tanishq</title>
</head>
<body>
  <h2>{{ category.name }} Collection</h2>

  {% for p in products %}
    <div>
      <h3>{{ p.name }}</h3>
      <p>{{ p.description }}</p>
      <p>₹{{ p.price }}</p>
      <img src="{{ p.image.url }}" width="100">
    </div>
  {% endfor %}
</body>
</html>
